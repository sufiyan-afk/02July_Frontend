<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML List examples</title>
</head>
<body>
    <h1>HTML list types</h1>
    <h2>ordered list</h2>
    <ol type="1">
        <li>Apple</li>
        <li>Banana</li>
        <li>Kiwi</li>
        <li>Mango</li>
    </ol>


    <h2>unordered list</h2>
    <ul>
        <li>Apple</li>
        <li>Banana</li>
        <li>Kiwi</li>
        <li>Mango</li>
    </ul>


    <h2>Description List</h2>
    <dl>
        <dt>Variable:</dt>
        <dd>named memory location which stores some value</dd>
    </dl>


    <h2>descendant list</h2>
    <dl></dl>
</body>
</html>
