<!-- create a student result -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Result</title>
</head>
<body>
    <table border="1" cellpadding="10" cellspacing="0">

        <tr>
            <th colspan="6">Student Result</th>
        </tr>

        <tr>
            <th rowspan="2">Name</th>
            <th colspan="3">Subjects</th>
            <th rowspan="2">Total</th>
            <th rowspan="2">Grade</th>
        </tr>

        <tr>
            <th>Maths</th>
            <th>Science</th>
            <th>English</th>
        </tr>

        
        <tr>
            <th>Sufiyan</th>
            <td>85</td>
            <td>90</td>
            <td>88</td>
            <td>263</td>
            <td>A</td>
        </tr>

        <tr>
            <th>Albert</th>
            <td>96</td>
            <td>100</td>
            <td>94</td>
            <td>290</td>
            <td>A+</td>
        </tr>

        <tr>
            <th>Kalam</th>
            <td>100</td>
            <td>100</td>
            <td>100</td>
            <td>300</td>
            <td>O</td>
        </tr>

        <tr>
            <th colspan="6">Overall result : Pass</th>
        </tr>
    </table>
</body>
</html>
