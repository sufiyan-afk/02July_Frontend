<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee record</title>
</head>
<body>

        <tr>
            <td>Ale</td>

        </tr>

        <tr>
            <td>Jack</td>
            <td>Junior Tech Writer</td>

    </table>

</html>
