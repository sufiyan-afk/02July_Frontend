<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Session 7</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h2>Social Icons</h2>

    <!-- Task 1 -->
    <div class="icons-container">
        <img src="https://via.placeholder.com/80?text=IG" alt="Instagram">
        <img src="https://via.placeholder.com/80?text=WA" alt="WhatsApp">
        <img src="https://via.placeholder.com/80?text=ZO" alt="Zomato">
        <img src="https://via.placeholder.com/80?text=SP" alt="Spotify">
    </div>

    <hr>

    <h2>Spotify Playlist</h2>

    <!-- Task 2 -->
    <div class="playlist">
        <div class="song-card">
            <p><strong>Believer</strong></p>
            <p>Imagine Dragons</p>
        </div>

        <div class="song-card">
            <p><strong>Perfect</strong></p>
            <p>Ed Sheeran</p>
        </div>

        <div class="song-card">
            <p><strong>Blinding Lights</strong></p>
            <p>The Weeknd</p>
        </div>

        <div class="song-card">
            <p><strong>Closer</strong></p>
            <p>The Chainsmokers</p>
        </div>

        <div class="song-card">
            <p><strong>Shape of You</strong></p>
            <p>Ed Sheeran</p>
        </div>
    </div>

    <hr>

    <h2>Flipkart Product Grid</h2>

    <!-- Task 3 & 4 -->
    <div class="product-grid">
        <div class="product-card">
            <img src="https://via.placeholder.com/120" alt="Product 1">
            <p>Product 1</p>
        </div>

        <div class="product-card">
            <img src="https://via.placeholder.com/120" alt="Product 2">
            <p>Product 2</p>
        </div>

        <div class="product-card">
            <img src="https://via.placeholder.com/120" alt="Product 3">
            <p>Product 3</p>
        </div>

        <div class="product-card">
            <img src="https://via.placeholder.com/120" alt="Product 4">
            <p>Product 4</p>
        </div>

        <div class="product-card">
            <img src="https://via.placeholder.com/120" alt="Product 5">
            <p>Product 5</p>
        </div>

        <div class="product-card">
            <img src="https://via.placeholder.com/120" alt="Product 6">
            <p>Product 6</p>
        </div>
    </div>

</body>
</html>
